<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(-45deg,#6a00ff,#00c3ff,#111);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
padding:20px;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.hero h1{
font-size:50px;
font-weight:800;
animation:fadeIn 1.5s ease;
}

.hero p{
margin-top:15px;
opacity:0.8;
font-size:18px;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.btn{
margin-top:25px;
padding:15px 35px;
border-radius:50px;
background:white;
color:black;
font-weight:600;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.15);
background:#ddd;
}

/* SECTIONS */
section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:50px;
}

.card{
background:#151515;
padding:30px;
width:280px;
border-radius:20px;
transition:0.4s;
opacity:0;
transform:translateY(40px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
background:#1d1d1d;
}

/* FORM */

form{
max-width:450px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
margin-top:40px;
}

input,textarea{
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1a1a1a;
color:white;
}

button{
padding:14px;
border:none;
border-radius:30px;
background:#6a00ff;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5200cc;
}

/* FOOTER */

footer{
padding:40px;
background:#111;
margin-top:40px;
opacity:0.7;
}

</style>
</head>
<body>

<div class="hero">
<h1>NovaWebStudio</h1>
<p>Modern | Hızlı | Profesyonel Web Çözümleri</p>

<a class="btn" href="#proje">Proje Başlat</a>
</div>

<section>
<h2>Hizmetlerimiz</h2>

<div class="cards">

<div class="card">
<h3>Kurumsal Site</h3>
<p>İşletmeniz için premium tasarım.</p>
</div>

<div class="card">
<h3>E-Ticaret</h3>
<p>Online satış için güçlü sistem.</p>
</div>

<div class="card">
<h3>Özel Yazılım</h3>
<p>Size özel projeler geliştiriyoruz.</p>
</div>

</div>
</section>

<section id="proje">
<h2>Proje Başlat</h2>

<form action="https://formspree.io/f/mqedongz" method="POST">

<input type="text" name="isim" placeholder="Ad Soyad" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="butce" placeholder="Tahmini Bütçe" required>
<textarea name="proje" rows="4" placeholder="Projenizi anlatın" required></textarea>

<button type="submit">Gönder</button>

</form>

</section>

<footer>
© 2026 NovaWebStudio - Tüm Hakları Saklıdır
</footer>

<script>

/* Scroll Animation */
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll",()=>{
cards.forEach(card=>{
const pos = card.getBoundingClientRect().top;
if(pos < window.innerHeight - 50){
card.classList.add("show");
}
});
});

</script>

</body>
</html>
