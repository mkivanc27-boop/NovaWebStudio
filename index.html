<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio | Smart Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at center,#1a1a1a,#0a0a0a);
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#6a00ff,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:0.7;
margin-top:20px;
font-size:20px;
}

.btn{
margin-top:30px;
padding:15px 40px;
border-radius:50px;
background:#6a00ff;
color:white;
text-decoration:none;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:#5200cc;
}

/* CALCULATOR */

.section{
padding:100px 10%;
text-align:center;
}

.box{
background:#111;
padding:50px;
border-radius:25px;
max-width:750px;
margin:auto;
border:1px solid #1f1f1f;
}

.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin:15px 0;
background:#1a1a1a;
border-radius:12px;
}

.total{
margin-top:30px;
font-size:30px;
font-weight:800;
color:#00c3ff;
transition:0.3s;
}

/* Toggle */

.switch input{
width:20px;
height:20px;
}

.recommend{
color:#00ff88;
font-size:14px;
margin-left:10px;
}

/* Form */

form{
margin-top:40px;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:14px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:white;
outline:none;
}

button{
padding:15px;
border:none;
border-radius:30px;
background:#6a00ff;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5200cc;
}

footer{
text-align:center;
padding:40px;
opacity:0.4;
}

</style>
</head>
<body>

<section class="hero">
<h1>Smart Project Builder</h1>
<p>Choose features & see price update instantly.</p>
<a class="btn" href="#builder">Start Building</a>
</section>

<section class="section" id="builder">

<div class="box">

<h2>Project Options</h2>

<div class="option">
<span>Corporate Website (+1000)</span>
<input type="checkbox" value="1000" onchange="calculatePrice()">
</div>

<div class="option">
<span>E-Commerce (+1500)</span>
<input type="checkbox" value="1500" onchange="calculatePrice()">
</div>

<div class="option">
<span>Domain Included (+500)</span>
<div>
<input type="checkbox" value="500" onchange="calculatePrice()">
<span id="domainTag" class="recommend"></span>
</div>
</div>

<div class="option">
<span>Custom Features (+800)</span>
<input type="checkbox" value="800" onchange="calculatePrice()">
</div>

<div class="total">
Total: $<span id="totalPrice">0</span>
</div>

<form action="https://formspree.io/f/mqedongz" method="POST">

<input type="hidden" name="finalPrice" id="hiddenPrice">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="details" rows="4" placeholder="Project Details"></textarea>

<button type="submit">Submit Project</button>

</form>

</div>

</section>

<footer>
© 2026 NovaWebStudio
</footer>

<script>

function calculatePrice(){

let total = 0;
let domainSelected = false;

document.querySelectorAll("input[type='checkbox']").forEach(box=>{
if(box.checked){
total += parseInt(box.value);
if(box.value == "500"){
domainSelected = true;
}
}
});

/* Fiyat animasyonlu artış */
let priceElement = document.getElementById("totalPrice");
let current = parseInt(priceElement.innerText);

let interval = setInterval(()=>{
if(current < total){
current++;
priceElement.innerText = current;
}else{
clearInterval(interval);
}
},5);

document.getElementById("hiddenPrice").value = total;

/* Domain seçilince mesaj */

let domainTag = document.getElementById("domainTag");

if(domainSelected){
domainTag.innerText = "✔ Recommended";
}else{
domainTag.innerText = "";
}

}

</script>

</body>
</html>
