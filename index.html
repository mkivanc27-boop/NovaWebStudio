<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#222;}

.container{
display:flex;
gap:30px;
padding:60px 5%;
}

.products{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.product{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.price-box{
margin:10px 0;
}

.old-price{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.new-price{
color:#e60023;
font-weight:700;
font-size:18px;
}

.discount-tag{
background:#e60023;
color:white;
padding:3px 8px;
font-size:12px;
border-radius:6px;
margin-left:5px;
}

.product button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff6000;
color:white;
cursor:pointer;
font-weight:600;
}

.cart{
flex:1;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
position:sticky;
top:20px;
height:fit-content;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:13px;
}

.total{
margin-top:10px;
font-size:18px;
font-weight:700;
color:#6a00ff;
}

</style>
</head>
<body>

<div class="container">

<div class="products">

<div class="product">
<h3>E-Ticaret Sitesi</h3>

<div class="price-box">
<span class="old-price">₺16000</span>
<span class="discount-tag">%20</span>
<div class="new-price">₺12800</div>
</div>

<button onclick="addToCart('E-Ticaret Sitesi',12800)">Sepete Ekle</button>
</div>

<div class="product">
<h3>Kurumsal Web Sitesi</h3>

<div class="price-box">
<span class="old-price">₺10000</span>
<span class="discount-tag">%10</span>
<div class="new-price">₺9000</div>
</div>

<button onclick="addToCart('Kurumsal Web Sitesi',9000)">Sepete Ekle</button>
</div>

</div>

<div class="cart">
<h3>Sepetim</h3>
<div id="cartItems"></div>
<div class="total">Toplam: ₺<span id="total">0</span></div>
</div>

</div>

<script>

let cart=[];

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach(item=>{
total+=item.price;
container.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>₺${item.price}</span>
</div>
`;
});

document.getElementById("total").innerText=total;
}

</script>

</body>
</html>
