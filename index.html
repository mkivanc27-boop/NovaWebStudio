<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* ===== HERO ===== */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at center,#141414,#0a0a0a);
padding:20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#6a00ff,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:20px;
opacity:0.8;
font-size:20px;
}

.btn{
margin-top:30px;
padding:15px 40px;
border-radius:50px;
background:#6a00ff;
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
cursor:pointer;
}

.btn:hover{
transform:scale(1.1);
background:#5200cc;
}

/* ===== CALCULATOR ===== */

.section{
padding:120px 10%;
text-align:center;
}

.box{
background:#111;
padding:50px;
border-radius:25px;
max-width:750px;
margin:auto;
border:1px solid #1f1f1f;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin:15px 0;
background:#1a1a1a;
border-radius:12px;
transition:0.3s;
}

.option:hover{
background:#222;
}

/* Toggle */

.switch{
position:relative;
display:inline-block;
width:50px;
height:24px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
transition:.4s;
border-radius:24px;
}

.slider:before{
position:absolute;
content:"";
height:18px;
width:18px;
left:4px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#6a00ff;
}

input:checked + .slider:before{
transform:translateX(24px);
}

/* Total */

.total{
margin-top:30px;
font-size:30px;
font-weight:800;
}

/* Form */

form{
margin-top:40px;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:14px;
border-radius:12px;
border:none;
background:#1a1a1a;
color:white;
outline:none;
}

button{
padding:15px;
border:none;
border-radius:30px;
background:#6a00ff;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5200cc;
}

/* Footer */

footer{
text-align:center;
padding:40px;
opacity:0.4;
}

</style>
</head>
<body>

<!-- HERO -->

<section class="hero">
<h1>Build Your Digital Project</h1>
<p>Choose features & calculate your price instantly.</p>

<a class="btn" href="#calculator">Start</a>
</section>

<!-- CALCULATOR -->

<section class="section" id="calculator">

<div class="box">

<h2>Project Configuration</h2>

<!-- OPTIONS -->

<div class="option">
<span>Corporate Website (+1000)</span>
<label class="switch">
<input type="checkbox" value="1000" onchange="calculatePrice()">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>E-Commerce (+1500)</span>
<label class="switch">
<input type="checkbox" value="1500" onchange="calculatePrice()">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Domain Included (+500)</span>
<label class="switch">
<input type="checkbox" value="500" onchange="calculatePrice()">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Custom Features (+800)</span>
<label class="switch">
<input type="checkbox" value="800" onchange="calculatePrice()">
<span class="slider"></span>
</label>
</div>

<!-- TOTAL -->

<div class="total">
Total: $<span id="totalPrice">0</span>
</div>

<!-- FORM -->

<form action="https://formspree.io/f/mqedongz" method="POST">

<input type="hidden" name="totalPrice" id="hiddenPrice">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="details" rows="4" placeholder="Project Details"></textarea>

<button type="submit">Send Project Request</button>

</form>

</div>

</section>

<footer>
© 2026 NovaWebStudio
</footer>

<script>

/* PRICE CALCULATOR */

function calculatePrice(){

let total = 0;

document.querySelectorAll("input[type='checkbox']").forEach(box=>{
if(box.checked){
total += parseInt(box.value);
}
});

document.getElementById("totalPrice").innerText = total;
document.getElementById("hiddenPrice").value = total;

}

</script>

</body>
</html>
