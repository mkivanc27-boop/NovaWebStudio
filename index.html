<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#222;}

header{
background:#6a00ff;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:600;
}

.section{padding:50px 10%;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product h3{
margin-bottom:10px;
}

.desc{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
min-height:40px;
}

.price{
font-weight:700;
margin-bottom:10px;
color:#6a00ff;
}

.product button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff6000;
color:white;
cursor:pointer;
font-weight:600;
}

.cart{
margin-top:50px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.total{
margin-top:15px;
font-size:18px;
font-weight:700;
color:#6a00ff;
}

.coupon{
margin-top:15px;
display:flex;
gap:10px;
}

.coupon input{
flex:1;
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

.coupon button{
padding:8px 15px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
cursor:pointer;
}

.checkout{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#6a00ff;
color:white;
font-weight:600;
cursor:pointer;
}

</style>
</head>
<body>

<header>NovaWebStudio Proje Sepeti</header>

<section class="section">

<div class="products">

<div class="product">
<h3>Kurumsal Web Sitesi</h3>
<div class="desc">Modern tasarım, mobil uyumlu yapı ve yönetim paneli dahil.</div>
<div class="price">₺10000</div>
<button onclick="addToCart('Kurumsal Web Sitesi',10000)">Sepete Ekle</button>
</div>

<div class="product">
<h3>E-Ticaret Sitesi</h3>
<div class="desc">Ürün yönetimi, ödeme altyapısı ve kargo entegrasyonu.</div>
<div class="price">₺15000</div>
<button onclick="addToCart('E-Ticaret Sitesi',15000)">Sepete Ekle</button>
</div>

<div class="product">
<h3>Domain + Hosting</h3>
<div class="desc">1 yıllık alan adı ve hızlı hosting paketi.</div>
<div class="price">₺3000</div>
<button onclick="addToCart('Domain + Hosting',3000)">Sepete Ekle</button>
</div>

</div>

<div class="cart">

<h3>Sepetim</h3>
<div id="cartItems"></div>

<div class="coupon">
<input type="text" id="couponCode" placeholder="Kupon kodu gir">
<button onclick="applyCoupon()">Uygula</button>
</div>

<div class="total">
Toplam: ₺<span id="totalPrice">0</span>
</div>

<button class="checkout" onclick="checkout()">Talep Gönder</button>

</div>

</section>

<script>

let cart = [];
let discount = 0;

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let container = document.getElementById("cartItems");
container.innerHTML="";
let total = 0;

cart.forEach(item=>{
total += item.price;
container.innerHTML += `
<div class="cart-item">
<span>${item.name}</span>
<span>₺${item.price}</span>
</div>
`;
});

total = total - discount;
if(total < 0) total = 0;

document.getElementById("totalPrice").innerText = total;
}

function applyCoupon(){
let code = document.getElementById("couponCode").value;

if(code === "INDIRIM10"){
discount = 1000;
alert("₺1000 indirim uygulandı 🎉");
}
else if(code === "PRO20"){
discount = 2000;
alert("₺2000 indirim uygulandı 🎉");
}
else{
discount = 0;
alert("Geçersiz kupon");
}

renderCart();
}

function checkout(){
if(cart.length === 0){
alert("Sepet boş");
return;
}
alert("Talebiniz gönderildi 🚀");
}

</script>

</body>
</html>
