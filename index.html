<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWebStudio | Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
}

/* LANGUAGE */

.lang{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:10px;
border-radius:10px;
}

.lang button{
background:#6a00ff;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at center,#1a1a1a,#0a0a0a);
}

.hero h1{
font-size:55px;
background:linear-gradient(90deg,#6a00ff,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:25px;
padding:15px 35px;
border-radius:40px;
background:#6a00ff;
color:white;
text-decoration:none;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SHOP */

.section{
padding:100px 10%;
text-align:center;
}

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.product{
background:#111;
padding:25px;
border-radius:15px;
width:250px;
border:1px solid #1f1f1f;
}

.product button{
margin-top:15px;
padding:8px 15px;
background:#00c3ff;
border:none;
border-radius:10px;
cursor:pointer;
}

.cart{
margin-top:60px;
background:#111;
padding:40px;
border-radius:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
margin-top:20px;
font-size:22px;
color:#00ff88;
}

.checkout{
margin-top:20px;
padding:12px;
background:#6a00ff;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<!-- LANGUAGE -->

<div class="lang">
<button onclick="setLang('tr')">TR</button>
<button onclick="setLang('en')">EN</button>
</div>

<!-- HERO -->

<section class="hero">
<h1 id="title">Project Builder</h1>
<p id="subtitle">Choose services and build your project</p>
<a class="btn" href="#shop" id="startBtn">Start</a>
</section>

<!-- SHOP -->

<section class="section" id="shop">

<h2 id="serviceText">Services</h2>

<div class="products">

<div class="product">
<h3>Corporate Website</h3>
<p>$1000</p>
<button onclick="addToCart('Corporate Website',1000)">Add</button>
</div>

<div class="product">
<h3>E-Commerce</h3>
<p>$1500</p>
<button onclick="addToCart('E-Commerce',1500)">Add</button>
</div>

<div class="product">
<h3>Domain Included</h3>
<p>$500</p>
<button onclick="addToCart('Domain',500)">Add</button>
</div>

</div>

<!-- CART -->

<div class="cart">

<h3 id="cartTitle">Your Cart</h3>

<div id="cartItems"></div>

<div class="total">
Total: $<span id="totalPrice">0</span>
</div>

<button class="checkout" onclick="checkout()">Send Request</button>

</div>

</section>

<script>

/* ===== LANGUAGE ===== */

const translations = {
tr:{
title:"Proje Oluşturucu",
subtitle:"Hizmetleri seç ve projenizi oluştur",
start:"Başla",
services:"Hizmetler",
cart:"Sepetin",
checkout:"Talep Gönder"
},
en:{
title:"Project Builder",
subtitle:"Choose services and build your project",
start:"Start",
services:"Services",
cart:"Your Cart",
checkout:"Send Request"
}
};

function setLang(lang){

document.getElementById("title").innerText = translations[lang].title;
document.getElementById("subtitle").innerText = translations[lang].subtitle;
document.getElementById("startBtn").innerText = translations[lang].start;
document.getElementById("serviceText").innerText = translations[lang].services;
document.getElementById("cartTitle").innerText = translations[lang].cart;

}

/* ===== CART SYSTEM ===== */

let cart = [];

function addToCart(name,price){

cart.push({name,price});
renderCart();

}

function renderCart(){

let cartContainer = document.getElementById("cartItems");
cartContainer.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{
total += item.price;

cartContainer.innerHTML += `
<div class="cart-item">
<span>${item.name}</span>
<span>$${item.price}</span>
</div>
`;
});

document.getElementById("totalPrice").innerText = total;

}

function checkout(){

if(cart.length === 0){
alert("Cart is empty!");
return;
}

alert("Project request sent 🚀");

}

</script>

</body>
</html>
