<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWeb Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0f172a;color:white}
header{background:#1e293b;padding:25px;text-align:center;font-size:26px;font-weight:700}
section{max-width:1100px;margin:auto;padding:40px}
.card{background:#1e293b;padding:25px;border-radius:12px;margin-bottom:25px}
select,input,textarea{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;background:#0f172a;color:white}
button{margin-top:15px;padding:12px;background:#2563eb;border:none;border-radius:8px;color:white;cursor:pointer}
button:hover{opacity:.85}
.highlight{color:#22c55e;font-weight:600}
.orderBox{background:#0f172a;padding:15px;border-radius:8px;margin-top:15px}
footer{text-align:center;padding:20px;background:#1e293b}
table{width:100%;border-collapse:collapse;margin-top:10px}
td{border:1px solid #333;padding:8px}
.copyBtn{background:#16a34a}
</style>
</head>
<body>

<header>NOVA WEB STUDIO</header>

<section>

<div class="card">
<h2>Sipariş Oluştur</h2>

<form id="orderForm" action="https://formspree.io/f/mqedongz" method="POST">

<select id="category">
<option value="">Kategori Seç</option>
<option value="Oyun">Oyun</option>
<option value="Yazılım">Yazılım</option>
<option value="Web">Web</option>
</select>

<div id="subContainer"></div>

<h3>Ek Özellikler</h3>
<label><input type="checkbox" class="feature" data-price="15000"> Özel Grafik (+15K)</label><br>
<label><input type="checkbox" class="feature" data-price="20000"> AI Sistem (+20K)</label><br>
<label><input type="checkbox" class="feature" data-price="25000"> Multiplayer (+25K)</label><br>

<h3>Kupon</h3>
<input type="text" id="coupon" placeholder="NOVA10 / NOVA20 / NOVA25">

<h3 id="totalPrice">Toplam: 0 TL</h3>

<input type="text" id="name" name="Ad Soyad" placeholder="Ad Soyad" required>
<input type="email" id="email" name="Email" placeholder="Email" required>
<textarea id="note" name="Proje Detayı" placeholder="Proje Detayı"></textarea>

<input type="hidden" name="Sipariş Kodu" id="mailCode">
<input type="hidden" name="Kategori" id="mailCategory">
<input type="hidden" name="Alt Kategori" id="mailSub">
<input type="hidden" name="Seçilen Özellikler" id="mailFeatures">
<input type="hidden" name="Toplam Fiyat" id="mailTotal">

<button type="button" onclick="createOrder()">Sipariş Ver</button>

</form>

<div id="orderResult"></div>

<div id="paymentInfo" style="display:none;margin-top:20px">
<p><b>IBAN:</b></p>
<p class="highlight">TR44 0006 2000 0690 0006 8490 45</p>
<p><b>Hesap Sahibi:</b> Mustafa Çivi</p>
<p>Açıklamaya sipariş kodunu yazınız.</p>
</div>

</div>

<div class="card">
<h2>Sipariş Sorgula</h2>
<input type="text" id="trackCode" placeholder="Sipariş Kodunu Gir">
<button onclick="searchOrder()">Sorgula</button>
<div id="trackResult"></div>
</div>

<div class="card">
<h2>Yorumlar</h2>
<input type="text" id="commentName" placeholder="Ad">
<textarea id="commentText" placeholder="Yorum"></textarea>
<button onclick="addComment()">Yorum Gönder</button>
<div id="commentsList"></div>
</div>

</section>

<footer>© 2026 NovaWeb Studio</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAnXPvCmQSecCk4pTx5NVYNxUcTaP6HAwA",
authDomain:"novawebstudio-51341.firebaseapp.com",
projectId:"novawebstudio-51341",
storageBucket:"novawebstudio-51341.firebasestorage.app",
messagingSenderId:"1024575965449",
appId:"1:1024575965449:web:a520edc17a8afd0d66abd8"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let selectedPrice=0;
let discountPercent=0;
let selectedSub="";

document.getElementById("category").addEventListener("change",function(){
selectedPrice=0;
selectedSub="";
document.getElementById("totalPrice").innerText="Toplam: 0 TL";
let c=document.getElementById("subContainer");
c.innerHTML="";

if(this.value==="Oyun"){
c.innerHTML=`<select id="subSelect">
<option value="30000">2D Oyun (+30K)</option>
<option value="60000">3D Oyun (+60K)</option>
<option value="90000">AAA Multiplayer (+90K)</option>
</select>`;
}
if(this.value==="Yazılım"){
c.innerHTML=`<select id="subSelect">
<option value="40000">Desktop (+40K)</option>
<option value="80000">Enterprise (+80K)</option>
</select>`;
}
if(this.value==="Web"){
c.innerHTML=`<select id="subSelect">
<option value="25000">Kurumsal (+25K)</option>
<option value="70000">E-Ticaret (+70K)</option>
</select>`;
}

setTimeout(()=>{
let sub=document.getElementById("subSelect");
if(sub){
sub.addEventListener("change",function(){
selectedPrice=parseInt(this.value)||0;
selectedSub=this.options[this.selectedIndex].text;
calculatePrice();
});
}
},100);
});

document.querySelectorAll(".feature").forEach(f=>{
f.addEventListener("change",calculatePrice);
});

document.getElementById("coupon").addEventListener("input",function(){
let c=this.value.toUpperCase();
if(c==="NOVA10") discountPercent=10;
else if(c==="NOVA20") discountPercent=20;
else if(c==="NOVA25") discountPercent=25;
else discountPercent=0;
calculatePrice();
});

function calculatePrice(){
let total=selectedPrice;
document.querySelectorAll(".feature:checked").forEach(f=>{
total+=parseInt(f.dataset.price);
});
if(discountPercent>0){
total-=total*discountPercent/100;
}
document.getElementById("totalPrice").innerText="Toplam: "+Math.floor(total)+" TL";
}

window.createOrder=async function(){

if(!selectedPrice){alert("Kategori seç");return;}

let code="NW-"+Math.random().toString(36).substr(2,6).toUpperCase();

let features=[];
document.querySelectorAll(".feature:checked").forEach(f=>{
features.push(f.parentElement.innerText.trim());
});

let totalText=document.getElementById("totalPrice").innerText;

await addDoc(collection(db,"orders"),{
code,
category:document.getElementById("category").value,
sub:selectedSub,
features,
total:totalText,
name:document.getElementById("name").value,
email:document.getElementById("email").value,
note:document.getElementById("note").value,
status:"Bekliyor",
createdAt:serverTimestamp()
});

document.getElementById("mailCode").value=code;
document.getElementById("mailCategory").value=document.getElementById("category").value;
document.getElementById("mailSub").value=selectedSub;
document.getElementById("mailFeatures").value=features.join(", ");
document.getElementById("mailTotal").value=totalText;

document.getElementById("orderForm").submit();

document.getElementById("orderResult").innerHTML=`
<div class="orderBox">
<p class="highlight">Sipariş oluşturuldu</p>
<p>Sipariş Kodunuz: <b id="codeText">${code}</b></p>
<button class="copyBtn" onclick="navigator.clipboard.writeText('${code}')">Kopyala</button>
</div>`;

document.getElementById("paymentInfo").style.display="block";

};

window.searchOrder=async function(){
let code=document.getElementById("trackCode").value;
let q=query(collection(db,"orders"),where("code","==",code));
let snap=await getDocs(q);
let found=null;
snap.forEach(doc=>found=doc.data());
if(!found){document.getElementById("trackResult").innerText="Bulunamadı";return;}
document.getElementById("trackResult").innerHTML=
"<div class='orderBox'>Durum: "+found.status+"</div>";
};

window.addComment=async function(){
let name=document.getElementById("commentName").value;
let text=document.getElementById("commentText").value;
if(text.length<5){alert("Yorum çok kısa");return;}
await addDoc(collection(db,"comments"),{name,text,createdAt:serverTimestamp()});
loadComments();
};

async function loadComments(){
let snap=await getDocs(collection(db,"comments"));
let html="";
snap.forEach(doc=>{
let d=doc.data();
html+=`<div class="orderBox"><b>${d.name}</b><p>${d.text}</p></div>`;
});
document.getElementById("commentsList").innerHTML=html;
}

loadComments();

</script>
</body>
</html>
